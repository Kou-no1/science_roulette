<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>班の役割ルーレット 🔬</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #f0effe;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1rem;
  }

  .app {
    background: #fff;
    border-radius: 20px;
    padding: 1.75rem 1.5rem 2rem;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 4px 24px rgba(127,119,221,0.13);
  }

  h1 {
    font-size: 22px;
    font-weight: 900;
    color: #1e1c40;
    margin-bottom: 4px;
    letter-spacing: 0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 1.5rem;
  }

  /* ステップインジケーター */
  .step-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 1.5rem;
  }
  .step {
    font-size: 12px;
    font-weight: 700;
    color: #bbb;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .step.active { color: #7F77DD; }
  .step.done   { color: #aaa; }
  .step-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .step-line { flex: 1; height: 1.5px; background: #e5e5e5; }

  /* 番号バッジ */
  .section-label {
    font-size: 14px;
    font-weight: 800;
    color: #1e1c40;
    margin-bottom: 10px;
    letter-spacing: 0.01em;
  }
  .members-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 18px;
  }
  .member-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #faf9ff;
    border: 1.5px solid #e0dcf8;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 17px;
    font-weight: 800;
    color: #3c3489;
  }
  .member-color { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

  /* 役割一覧 */
  .roles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .role-badge {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 11px 12px;
    border-radius: 12px;
    border: 1.5px solid #ece9fb;
    background: #faf9ff;
  }
  .role-icon { font-size: 18px; margin-top: 1px; flex-shrink: 0; }
  .role-name { font-size: 14px; font-weight: 800; color: #2e2a7a; }
  .role-desc { font-size: 11px; color: #888; margin-top: 3px; line-height: 1.4; }

  /* ボタン */
  .spin-btn {
    display: block; width: 100%;
    padding: 15px;
    font-size: 16px; font-weight: 800;
    background: #7F77DD; color: #fff;
    border: none; border-radius: 14px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.03em;
  }
  .spin-btn:hover { opacity: 0.88; }
  .spin-btn:active { transform: scale(0.98); }
  .spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .spin-btn.green { background: #1D9E75; }

  /* ===== 一斉ルーレット ===== */
  .drums-wrap {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 14px;
  }
  .drum-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .drum-col-role {
    font-size: 10px;
    font-weight: 800;
    color: #fff;
    padding: 5px 4px;
    border-radius: 8px 8px 0 0;
    text-align: center;
    width: 100%;
    line-height: 1.3;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .drum-stage {
    position: relative;
    height: 130px;
    width: 100%;
    border-radius: 0 0 10px 10px;
    border: 1.5px solid #e0dcf8;
    border-top: none;
    background: #faf9ff;
    overflow: hidden;
  }
  .drum-inner {
    display: flex;
    flex-direction: column;
    position: absolute;
    width: 100%;
  }
  .drum-cell {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .drum-highlight {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 40px;
    transform: translateY(-50%);
    border-top: 2px solid #7F77DD;
    border-bottom: 2px solid #7F77DD;
    background: rgba(127,119,221,0.10);
    pointer-events: none;
  }

  /* 停止後のドラム確定表示 */
  .drum-result {
    height: 130px;
    width: 100%;
    border-radius: 0 0 10px 10px;
    border: 2.5px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    flex-direction: column;
    gap: 4px;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .drum-result-num { font-size: 11px; font-weight: 700; opacity: 0.7; }

  .spin-btn-wrap { margin-top: 4px; }

  /* 結果カード */
  .results-title {
    font-size: 18px;
    font-weight: 900;
    color: #1e1c40;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .result-card {
    padding: 14px 14px;
    border-radius: 14px;
    border: 2px solid transparent;
  }
  .rc-role {
    font-size: 12px; font-weight: 700;
    color: #888; margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }
  .rc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .rc-name { font-size: 20px; font-weight: 900; }
  .rc-desc { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.4; }

  .reset-btn {
    display: block; width: 100%; padding: 11px;
    font-size: 14px; font-weight: 700;
    background: transparent;
    border: 1.5px solid #ddd;
    border-radius: 12px; color: #888;
    cursor: pointer; margin-top: 8px;
  }
  .reset-btn:hover { background: #f5f5f5; }

  /* 全画面表示モーダル */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: #1a1840;
    z-index: 200;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  .modal-bg.open { display: flex; }

  .modal-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .modal-header-title {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .modal-header-sub {
    font-size: clamp(12px, 2vw, 15px);
    color: rgba(255,255,255,0.5);
    font-weight: 600;
  }

  .modal-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(10px, 2vw, 20px);
    width: 100%;
    max-width: 780px;
    margin-bottom: 2rem;
  }
  .modal-card {
    border-radius: 20px;
    padding: clamp(16px, 3vw, 28px) clamp(16px, 3vw, 28px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { transform: scale(0.75) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0);       opacity: 1; }
  }
  .modal-card:nth-child(1){ animation-delay: 0.00s; }
  .modal-card:nth-child(2){ animation-delay: 0.08s; }
  .modal-card:nth-child(3){ animation-delay: 0.16s; }
  .modal-card:nth-child(4){ animation-delay: 0.24s; }

  .mc-role-row {
    display: flex; align-items: center; gap: 8px;
  }
  .mc-role-icon {
    font-size: clamp(18px, 3vw, 26px);
    line-height: 1;
  }
  .mc-role-name {
    font-size: clamp(13px, 2.2vw, 18px);
    font-weight: 800;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.02em;
  }
  .mc-member {
    font-size: clamp(38px, 9vw, 72px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.04em;
    line-height: 1.1;
    text-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .mc-desc {
    font-size: clamp(10px, 1.6vw, 13px);
    color: rgba(255,255,255,0.65);
    line-height: 1.4;
    font-weight: 600;
  }

  .modal-close {
    padding: 12px 40px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 99px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.18s;
    letter-spacing: 0.04em;
  }
  .modal-close:hover { background: rgba(255,255,255,0.25); }
</style>
</head>
<body>

<div class="app">
  <h1>班の役割ルーレット 🔬</h1>
  <p class="subtitle">理科授業 ・ 4人班用 ・ 小単元ごとにローテーション</p>

  <div class="step-indicator">
    <div class="step active" id="step1"><span class="step-dot"></span>メンバー確認</div>
    <div class="step-line"></div>
    <div class="step" id="step2"><span class="step-dot"></span>役割を確認</div>
    <div class="step-line"></div>
    <div class="step" id="step3"><span class="step-dot"></span>抽選スタート</div>
  </div>

  <!-- ① 確認画面 -->
  <div id="setup-view">
    <div class="section-label">👥 班のメンバー</div>
    <div class="members-grid">
      <div class="member-badge"><div class="member-color" style="background:#7F77DD"></div>1番</div>
      <div class="member-badge"><div class="member-color" style="background:#1D9E75"></div>2番</div>
      <div class="member-badge"><div class="member-color" style="background:#D85A30"></div>3番</div>
      <div class="member-badge"><div class="member-color" style="background:#D4537E"></div>4番</div>
    </div>

    <div class="section-label">📋 今回の役割（小単元ごとにかわるよ）</div>
    <div class="roles-grid">
      <div class="role-badge"><span class="role-icon">💬</span><div><div class="role-name">予想発表</div><div class="role-desc">グループの予想を代表してクラスに発表する</div></div></div>
      <div class="role-badge"><span class="role-icon">🔭</span><div><div class="role-name">考察発表</div><div class="role-desc">実験の考察をグループ代表として発表する</div></div></div>
      <div class="role-badge"><span class="role-icon">✏️</span><div><div class="role-name">結果・考察記録</div><div class="role-desc">実験の結果と考察をワークシートに記録する</div></div></div>
      <div class="role-badge"><span class="role-icon">⭐</span><div><div class="role-name">学習リーダー</div><div class="role-desc">班の話し合いをリードし進行を担当する</div></div></div>
    </div>

    <button class="spin-btn" onclick="startRoulette()">🎲 いっせいに役割を決める！</button>
  </div>

  <!-- ② 一斉ルーレット画面 -->
  <div id="roulette-view" style="display:none;">
    <div class="section-label" style="text-align:center; margin-bottom:12px;">4人いっせいに抽選中…</div>
    <div class="drums-wrap" id="drums-wrap"></div>
    <div class="spin-btn-wrap">
      <button class="spin-btn" id="spin-btn" onclick="spinAll()">🎲 まわす！</button>
    </div>
  </div>

  <!-- ③ 結果画面 -->
  <div id="results-view" style="display:none;">
    <div class="results-title">🌟 今回の役割分担</div>
    <div class="result-cards" id="result-cards"></div>
    <button class="spin-btn green" onclick="openModal()">🖥 みんなに見せるように表示</button>
    <button class="reset-btn" onclick="resetApp()">🔄 もう一度やり直す</button>
  </div>
</div>

<!-- 全画面表示モーダル -->
<div class="modal-bg" id="modal-bg" onclick="closeModalBg(event)">
  <div class="modal-header">
    <div class="modal-header-title">🌟 今回の役割分担</div>
    <div class="modal-header-sub">タップして閉じる</div>
  </div>
  <div class="modal-cards" id="modal-cards"></div>
  <button class="modal-close" onclick="closeModal()">✕ 閉じる</button>
</div>

<script>
const ROLES = [
  { name: "予想発表",     icon: "💬", desc: "グループの予想を代表してクラスに発表する" },
  { name: "考察発表",     icon: "🔭", desc: "実験の考察をグループ代表として発表する" },
  { name: "結果・考察記録", icon: "✏️", desc: "実験の結果と考察をワークシートに記録する" },
  { name: "学習リーダー", icon: "⭐", desc: "班の話し合いをリードし進行を担当する" },
];
const MEMBERS      = ["1番","2番","3番","4番"];
const COLORS       = ["#7F77DD","#1D9E75","#D85A30","#D4537E"];
const LIGHT_COLORS = ["#EEEDFE","#E1F5EE","#FAECE7","#FBEAF0"];
const BORDER_COLORS= ["#AFA9EC","#5DCAA5","#F0997B","#ED93B1"];
const ROLE_COLORS  = ["#7F77DD","#1D9E75","#D85A30","#D4537E"];

const ITEM_H = 40;
let assignments = [];  // [{role, memberIdx}]
let spinning = false;

/* ---------- ステップ ---------- */
function setStep(done, active){
  ["step1","step2","step3"].forEach((id,i)=>{
    document.getElementById(id).className =
      "step" + (i+1===active?" active": i+1<=done?" done":"");
  });
}

/* ---------- 開始 ---------- */
function startRoulette(){
  assignments = [];
  document.getElementById("setup-view").style.display    = "none";
  document.getElementById("roulette-view").style.display = "block";
  setStep(1,2);
  buildDrums();
}

/* ---------- ドラム4列を構築 ---------- */
function buildDrums(){
  const wrap = document.getElementById("drums-wrap");
  wrap.innerHTML = ROLES.map((role, ri)=>{
    const roleBg = ROLE_COLORS[ri];
    const items  = [...MEMBERS, ...MEMBERS, ...MEMBERS]
      .map(m=>{
        const mi = MEMBERS.indexOf(m);
        return `<div class="drum-cell"
          style="background:${LIGHT_COLORS[mi]};color:${COLORS[mi]};">
          ${m}
        </div>`;
      }).join("");
    return `
      <div class="drum-col">
        <div class="drum-col-role" style="background:${roleBg};">
          ${role.icon}<br>${role.name}
        </div>
        <div class="drum-stage" id="stage${ri}">
          <div class="drum-inner" id="drum${ri}" style="transform:translateY(-${ITEM_H}px);">
            ${items}
          </div>
          <div class="drum-highlight"></div>
        </div>
      </div>`;
  }).join("");
}

/* ---------- 一斉スピン ---------- */
function spinAll(){
  if(spinning) return;
  spinning = true;
  document.getElementById("spin-btn").disabled = true;
  document.getElementById("spin-btn").textContent = "⏳ 抽選中…";

  // ランダムにシャッフルして4人に役割を割り当て
  const shuffled = [...Array(4).keys()].sort(()=>Math.random()-0.5);
  // shuffled[ri] = 役割riを担当するメンバーindex

  const totalMs = 2600;
  // 各ドラムの終着フレーム（少しずつずらしてリアル感）
  const delays  = [0, 200, 400, 600];

  let doneCount = 0;

  ROLES.forEach((role, ri)=>{
    const targetMemberIdx = shuffled[ri];
    const drum = document.getElementById("drum"+ri);
    const loops = 3 + ri; // ドラムごとに少し回転数を変える
    const finalDist = (loops * MEMBERS.length + targetMemberIdx) * ITEM_H;
    const myDuration = totalMs + delays[ri];

    let elapsed = 0, lastTs = null;

    function animate(ts){
      if(!lastTs) lastTs = ts;
      elapsed += ts - lastTs;
      lastTs = ts;
      const prog  = Math.min(elapsed / myDuration, 1);
      const eased = 1 - Math.pow(1 - prog, 3);
      const moved = eased * finalDist;
      const disp  = -((moved % (MEMBERS.length * ITEM_H)) + ITEM_H);
      drum.style.transform = `translateY(${disp}px)`;
      if(prog < 1){
        requestAnimationFrame(animate);
      } else {
        // このドラム確定
        doneCount++;
        assignments[ri] = { role, memberIdx: targetMemberIdx };
        if(doneCount === ROLES.length){
          setTimeout(showResults, 500);
        }
      }
    }
    requestAnimationFrame(animate);
  });
}

/* ---------- 結果表示 ---------- */
function showResults(){
  spinning = false;
  document.getElementById("roulette-view").style.display = "none";
  document.getElementById("results-view").style.display  = "block";
  setStep(2, 3);

  const rc = document.getElementById("result-cards");
  rc.innerHTML = assignments.map((a, ri)=>{
    const mi  = a.memberIdx;
    const c   = COLORS[mi];
    const bg  = LIGHT_COLORS[mi];
    const brd = BORDER_COLORS[mi];
    return `<div class="result-card" style="background:${bg};border-color:${brd};">
      <div class="rc-role">
        <div class="rc-dot" style="background:${ROLE_COLORS[ri]};"></div>
        ${a.role.icon} ${a.role.name}
      </div>
      <div class="rc-name" style="color:${c};">${MEMBERS[mi]}</div>
      <div class="rc-desc">${a.role.desc}</div>
    </div>`;
  }).join("");
}

/* ---------- 全画面モーダル ---------- */
function openModal(){
  const BG_COLORS = [
    "linear-gradient(135deg,#5b52c9,#7F77DD)",
    "linear-gradient(135deg,#13845f,#1D9E75)",
    "linear-gradient(135deg,#b84420,#D85A30)",
    "linear-gradient(135deg,#b03466,#D4537E)",
  ];
  document.getElementById("modal-cards").innerHTML = assignments.map((a, ri)=>{
    const mi = a.memberIdx;
    return `<div class="modal-card" style="background:${BG_COLORS[mi]};">
      <div class="mc-role-row">
        <span class="mc-role-icon">${a.role.icon}</span>
        <span class="mc-role-name">${a.role.name}</span>
      </div>
      <div class="mc-member">${MEMBERS[mi]}</div>
      <div class="mc-desc">${a.role.desc}</div>
    </div>`;
  }).join("");
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(){ document.getElementById("modal-bg").classList.remove("open"); }
function closeModalBg(e){ if(e.target===document.getElementById("modal-bg")) closeModal(); }

/* ---------- リセット ---------- */
function resetApp(){
  assignments = [];
  document.getElementById("results-view").style.display  = "none";
  document.getElementById("roulette-view").style.display = "none";
  document.getElementById("setup-view").style.display    = "block";
  ["step1","step2","step3"].forEach((id,i)=>
    document.getElementById(id).className = "step"+(i===0?" active":""));
}
</script>
</body>
</html>
